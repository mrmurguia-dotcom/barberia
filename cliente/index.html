<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Turno - Lyon Barber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; } /* Coincidir exacto con el Hub */
    </style>
</head>
<body class="text-white min-h-screen font-sans">

    <header class="p-4 flex items-center gap-4 border-b border-slate-800 sticky top-0 bg-[#0f172a] z-50">
        <a href="../index.html" class="bg-slate-800 p-3 rounded-2xl hover:bg-slate-700 transition active:scale-95 shadow-lg">
            ⬅️
        </a>
        <div class="flex items-center gap-3">
            <img src="../logom2.jpg" alt="Logo Lyon Barber" class="w-14 h-14 rounded-full border-2 border-yellow-500 shadow-2xl">
            <div>
                <h1 class="font-black text-2xl italic text-yellow-500 leading-none">LYON BARBER</h1>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Reservar Turno</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 pb-12">
        <div class="mb-8 space-y-5 bg-slate-800/50 p-6 rounded-3xl border border-slate-700/50 shadow-xl">
            <h3 class="text-gray-400 font-bold text-sm uppercase mb-1">Paso 1: Completá tus datos</h3>
            
            <label class="block">
                <span class="text-gray-300 text-sm font-semibold">Tu Nombre Completo</span>
                <input type="text" id="nombreCliente" placeholder="Ej: Juan Pérez" 
                    class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl mt-1 focus:ring-2 focus:ring-yellow-500 outline-none transition text-gray-100">
            </label>

            <label class="block">
                <span class="text-gray-300 text-sm font-semibold">Tu Número de Teléfono</span>
                <input type="tel" id="telefonoCliente" placeholder="Ej: 11 1234 5678" required
                    class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl mt-1 focus:ring-2 focus:ring-yellow-500 outline-none transition text-gray-100">
                <span class="text-xs text-gray-500 mt-1 block px-1">Lo usaremos solo para confirmar tu turno.</span>
            </label>
        </div>

        <div class="mb-8 space-y-5 bg-slate-800/50 p-6 rounded-3xl border border-slate-700/50 shadow-xl">
            <h3 class="text-gray-400 font-bold text-sm uppercase mb-1">Paso 2: Elegí cuándo venir</h3>
            
            <label class="block">
                <span class="text-gray-300 text-sm font-semibold">Seleccionar Fecha</span>
                <input type="date" id="fecha" 
                    class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl mt-1 focus:ring-2 focus:ring-yellow-500 outline-none text-white transition">
            </label>

            <div class="mt-4">
                <span class="text-gray-300 text-sm font-semibold block mb-3">Horarios Disponibles (10 a 20 hs)</span>
                <div id="slots" class="grid grid-cols-3 gap-3">
                    <p class="text-gray-500 text-sm italic col-span-3 text-center py-4">Verificando agenda...</p>
                </div>
            </div>
        </div>

        <div class="sticky bottom-4 z-40 bg-[#0f172a] py-2 rounded-xl">
            <button onclick="confirmarTurno()" 
                class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl shadow-[0_4px_30px_rgba(234,179,8,0.4)] hover:bg-yellow-400 transition active:scale-95 text-lg uppercase tracking-wider">
                Confirmar Turno
            </button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // TUS CREDENCIALES INTEGRADAS
        const firebaseConfig = {
          apiKey: "AIzaSyCLBGU0u6QYdAweKqSia7yFMSvS9F4QHBM",
          authDomain: "barberia-4b1f9.firebaseapp.com",
          projectId: "barberia-4b1f9",
          storageBucket: "barberia-4b1f9.firebasestorage.app",
          messagingSenderId: "1062067345937",
          appId: "1:1062067345937:web:fdd305a34a21c67837afb0",
          measurementId: "G-XTF1P4LKV8"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const slotsContainer = document.getElementById('slots');
        const inputFecha = document.getElementById('fecha');
        const inputTelefono = document.getElementById('telefonoCliente');

        // HORARIO COMPLETO (Sincronizado con Admin)
        const horariosBase = [
            "10:00", "11:00", "12:00", "13:00", "14:00", 
            "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"
        ];
        
        let horaSeleccionada = "";

        // Fecha de hoy por defecto al iniciar
        const hoy = new Date().toISOString().split('T')[0];
        inputFecha.value = hoy;

        // Actualizar slots si cambia la fecha
        inputFecha.addEventListener('change', cargarDisponibilidad);

        async function cargarDisponibilidad() {
            slotsContainer.innerHTML = "<p class='col-span-3 text-center text-sm text-gray-500 animate-pulse py-4'>Consultando disponibilidad...</p>";
            const fechaElegida = inputFecha.value;

            try {
                // Consultamos todos los turnos/bloqueos para esa fecha
                const q = query(collection(db, "turnos"), where("fecha", "==", fechaElegida));
                const querySnapshot = await getDocs(q);
                const horasOcupadas = [];
                querySnapshot.forEach((doc) => horasOcupadas.push(doc.data().hora));

                slotsContainer.innerHTML = "";
                horariosBase.forEach(hora => {
                    const estaOcupado = horasOcupadas.includes(hora);
                    const btn = document.createElement('button');
                    btn.innerText = hora;
                    
                    if (estaOcupado) {
                        btn.className = "py-3 bg-slate-800 text-slate-600 rounded-xl cursor-not-allowed border border-slate-700 text-sm font-medium";
                        btn.disabled = true;
                    } else {
                        btn.className = "py-3 bg-slate-700 rounded-xl hover:bg-yellow-500/10 hover:border-yellow-500 transition text-sm font-semibold border border-slate-600 text-gray-100";
                        btn.onclick = (e) => {
                            e.preventDefault();
                            // Desmarcar otros botones
                            document.querySelectorAll('#slots button').forEach(b => {
                                if(!b.disabled) b.className = "py-3 bg-slate-700 rounded-xl hover:bg-yellow-500/10 hover:border-yellow-500 transition text-sm font-semibold border border-slate-600 text-gray-100";
                            });
                            // Marcar este botón como seleccionado
                            btn.className = "py-3 bg-yellow-500 text-black font-black rounded-xl text-sm shadow-[0_0_20px_rgba(234,179,8,0.5)] border-2 border-white";
                            horaSeleccionada = hora;
                        };
                    }
                    slotsContainer.appendChild(btn);
                });
            } catch (error) {
                console.error("Error:", error);
                slotsContainer.innerHTML = "<p class='col-span-3 text-red-400 text-center text-xs bg-red-500/10 p-4 rounded-xl'>⚠️ Error de conexión. Reintentá.</p>";
            }
        }

        window.confirmarTurno = async () => {
            const fecha = inputFecha.value;
            const nombre = document.getElementById('nombreCliente').value.trim();
            const telefono = inputTelefono.value.trim();

            // Validación de campos obligatorios
            if(!fecha || !horaSeleccionada || !nombre || !telefono) {
                alert("⚠️ Por favor, completá tu Nombre, Teléfono y elegí un Horario.");
                return;
            }

            // Opcional: Validación básica de formato de teléfono (puedes ajustarla)
            if(telefono.length < 8) {
                alert("⚠️ Por favor, ingresá un número de teléfono válido.");
                return;
            }

            try {
                // Guardamos el registro completo en Firebase
                await addDoc(collection(db, "turnos"), {
                    cliente: nombre,
                    telefono: telefono, // Nuevo campo fundamental
                    fecha: fecha,
                    hora: horaSeleccionada,
                    estado: "confirmado",
                    creado: new Date().toISOString()
                });
                alert("✅ ¡Turno reservado con éxito en LYON BARBER!");
                // Redirigir de vuelta al Panel Central
                window.location.href = "../index.html"; 
            } catch (e) { 
                console.error("Error al guardar:", e);
                alert("❌ Hubo un error al guardar tu reserva. Por favor, reintentá."); 
            }
        }

        // Carga inicial al abrir la página
        cargarDisponibilidad();
    </script>
</body>
</html>
