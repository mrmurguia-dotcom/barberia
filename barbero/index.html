<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Barbero - Barbería Lyon Barber</title>
    <style>
        body { background-color: #0f172a; } /* Color del panel principal */
    </style>
</head>
<body class="text-white min-h-screen font-sans">
    <header class="p-6 flex justify-between items-center max-w-2xl mx-auto border-b border-slate-800">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="bg-slate-800 p-2 rounded-xl hover:bg-slate-700 transition">⬅️</a>
            <div>
                <h1 class="font-bold text-xl italic text-yellow-500">ADMIN BARBER</h1>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Gestión Interna</p>
            </div>
        </div>
        <input type="date" id="filtroFecha" class="bg-slate-800 border border-slate-700 p-2 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-yellow-500">
    </header>

    <main class="p-6 max-w-2xl mx-auto">
        
        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-5 mb-8 shadow-xl">
            <h3 class="text-yellow-500 font-bold text-sm uppercase mb-4 flex items-center gap-2">
                🚫 Bloquear Agenda (Día Seleccionado)
            </h3>
            <div id="gridBloqueo" class="grid grid-cols-4 gap-2">
                </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-gray-400 font-bold uppercase text-xs tracking-widest italic">Turnos de Clientes</h2>
            <span id="contadorTurnos" class="bg-yellow-500 text-black text-xs font-black px-3 py-1 rounded-full shadow-lg">0 TURNOS</span>
        </div>

        <div id="listaTurnos" class="space-y-3">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCLBGU0u6QYdAweKqSia7yFMSvS9F4QHBM",
          authDomain: "barberia-4b1f9.firebaseapp.com",
          projectId: "barberia-4b1f9",
          storageBucket: "barberia-4b1f9.firebasestorage.app",
          messagingSenderId: "1062067345937",
          appId: "1:1062067345937:web:fdd305a34a21c67837afb0",
          measurementId: "G-XTF1P4LKV8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const filtroFecha = document.getElementById('filtroFecha');
        const listaTurnos = document.getElementById('listaTurnos');
        const gridBloqueo = document.getElementById('gridBloqueo');
        const contadorTurnos = document.getElementById('contadorTurnos');

        // Horarios fijos de 10 a 20 hs
        const horariosBase = ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];

        // Fecha de hoy por defecto
        const hoy = new Date().toISOString().split('T')[0];
        filtroFecha.value = hoy;

        let unsubscribe = null;

        function escucharAgenda() {
            if (unsubscribe) unsubscribe();

            const q = query(collection(db, "turnos"), where("fecha", "==", filtroFecha.value));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                listaTurnos.innerHTML = "";
                const ocupados = [];
                const turnosClientes = [];

                snapshot.forEach((d) => {
                    const data = d.data();
                    ocupados.push(data.hora);
                    if (data.cliente !== "BLOQUEADO") {
                        turnosClientes.push({ id: d.id, ...data });
                    }
                });

                // 1. Dibujar botones de bloqueo
                gridBloqueo.innerHTML = "";
                horariosBase.forEach(hora => {
                    const estaBloqueado = ocupados.includes(hora);
                    const btn = document.createElement('button');
                    btn.innerText = hora;
                    btn.className = estaBloqueado 
                        ? "py-2 bg-red-500/20 border border-red-500/50 text-red-500 rounded-xl text-xs font-bold transition"
                        : "py-2 bg-slate-700 border border-slate-600 text-gray-300 rounded-xl text-xs font-bold hover:bg-slate-600 transition";
                    
                    btn.onclick = () => togglerBloqueo(hora, estaBloqueado, snapshot);
                    gridBloqueo.appendChild(btn);
                });

                // 2. Dibujar lista de clientes
                contadorTurnos.innerText = `${turnosClientes.length} TURNOS`;
                if (turnosClientes.length === 0) {
                    listaTurnos.innerHTML = `<p class="text-center py-10 text-gray-500 italic text-sm">Sin turnos de clientes para hoy</p>`;
                } else {
                    turnosClientes.sort((a,b) => a.hora.localeCompare(b.hora)).forEach(t => {
                        const card = document.createElement('div');
                        card.className = "bg-slate-800 border border-slate-700 p-4 rounded-2xl flex justify-between items-center shadow-lg animate-in fade-in slide-in-from-bottom-2 duration-300";
                        card.innerHTML = `
                            <div class="flex items-center gap-4">
                                <span class="bg-yellow-500 text-black font-black px-2 py-1 rounded-lg text-xs">${t.hora}</span>
                                <p class="font-bold text-gray-200 capitalize">${t.cliente}</p>
                            </div>
                            <button onclick="borrarRegistro('${t.id}')" class="text-red-400 hover:bg-red-500/10 p-2 rounded-xl transition">🗑️</button>
                        `;
                        listaTurnos.appendChild(card);
                    });
                }
            });
        }

        async function togglerBloqueo(hora, estaBloqueado, snapshot) {
            if (estaBloqueado) {
                // Si está bloqueado, buscamos el ID para borrarlo
                let idParaBorrar = "";
                snapshot.forEach(d => { if(d.data().hora === hora) idParaBorrar = d.id; });
                if (idParaBorrar) await deleteDoc(doc(db, "turnos", idParaBorrar));
            } else {
                // Bloquear horario
                await addDoc(collection(db, "turnos"), {
                    cliente: "BLOQUEADO",
                    fecha: filtroFecha.value,
                    hora: hora,
                    estado: "bloqueado"
                });
            }
        }

        window.borrarRegistro = async (id) => {
            if(confirm("¿Eliminar este turno definitivamente?")) {
                await deleteDoc(doc(db, "turnos", id));
            }
        }

        filtroFecha.addEventListener('change', escucharAgenda);
        escucharAgenda();
    </script>
</body>
</html>
