<body class="text-white min-h-screen font-sans">
    <header class="p-6 flex justify-between items-center max-w-2xl mx-auto border-b border-slate-800">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="bg-slate-800 p-2 rounded-xl hover:bg-slate-700 transition">⬅️</a>
            <img src="../logom2.jpg" alt="Logo" class="w-12 h-12 rounded-full border border-yellow-500 shadow-lg">
            <div>
                <h1 class="font-bold text-xl italic text-yellow-500">ADMIN BARBER</h1>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Gestión Interna</p>
            </div>
        </div>
        <input type="date" id="filtroFecha" class="bg-slate-800 border border-slate-700 p-2 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-yellow-500">
    </header>

    <main class="p-6 max-w-2xl mx-auto">
        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-5 mb-8 shadow-xl">
            <h3 class="text-yellow-500 font-bold text-sm uppercase mb-2 flex items-center gap-2">
                🚫 Gestionar Agenda
            </h3>
            <p id="msgDomingo" class="text-[10px] text-gray-400 mb-3 hidden uppercase font-bold tracking-tighter">* Domingos bloqueados por defecto. Toca para abrir un turno.</p>
            <div id="gridBloqueo" class="grid grid-cols-4 gap-2">
                </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-gray-400 font-bold uppercase text-xs tracking-widest italic">Turnos de Clientes</h2>
            <span id="contadorTurnos" class="bg-yellow-500 text-black text-xs font-black px-3 py-1 rounded-full shadow-lg">0 TURNOS</span>
        </div>

        <div id="listaTurnos" class="space-y-3">
            </div>
    </main>

    <script type="module">
        // ... (Importaciones e inicialización de Firebase iguales) ...

        function escucharAgenda() {
            if (unsubscribe) unsubscribe();

            const fechaSeleccionada = filtroFecha.value;
            const fechaObj = new Date(fechaSeleccionada + 'T00:00:00');
            const esDomingo = fechaObj.getDay() === 0;

            // Mostrar mensaje de aviso si es domingo
            document.getElementById('msgDomingo').classList.toggle('hidden', !esDomingo);

            const q = query(collection(db, "turnos"), where("fecha", "==", fechaSeleccionada));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                listaTurnos.innerHTML = "";
                const ocupados = [];
                const abiertosDomingo = [];
                const turnosClientes = [];

                snapshot.forEach((d) => {
                    const data = d.data();
                    if (data.cliente === "BLOQUEADO") ocupados.push(data.hora);
                    else if (data.cliente === "ABIERTO_DOMINGO") abiertosDomingo.push(data.hora);
                    else {
                        ocupados.push(data.hora);
                        turnosClientes.push({ id: d.id, ...data });
                    }
                });

                // 1. Dibujar botones de bloqueo/apertura
                gridBloqueo.innerHTML = "";
                horariosBase.forEach(hora => {
                    const estaOcupadoDB = ocupados.includes(hora);
                    const estaAbiertoDom = abiertosDomingo.includes(hora);
                    
                    let estadoFinalBloqueado = false;
                    if (esDomingo) {
                        // En domingo: Bloqueado si NO está marcado como "ABIERTO" o si hay un cliente
                        estadoFinalBloqueado = !estaAbiertoDom || estaOcupadoDB;
                    } else {
                        // En semana: Bloqueado si está en la DB como bloqueo o cliente
                        estadoFinalBloqueado = estaOcupadoDB;
                    }

                    const btn = document.createElement('button');
                    btn.innerText = hora;
                    btn.className = estadoFinalBloqueado 
                        ? "py-2 bg-red-500/20 border border-red-500/50 text-red-500 rounded-xl text-xs font-bold transition"
                        : "py-2 bg-slate-700 border border-slate-600 text-gray-300 rounded-xl text-xs font-bold hover:bg-slate-600 transition";
                    
                    btn.onclick = () => togglerBloqueo(hora, estadoFinalBloqueado, esDomingo, snapshot);
                    gridBloqueo.appendChild(btn);
                });

                // 2. Dibujar lista con TELÉFONO
                contadorTurnos.innerText = `${turnosClientes.length} TURNOS`;
                turnosClientes.sort((a,b) => a.hora.localeCompare(b.hora)).forEach(t => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 border border-slate-700 p-4 rounded-2xl flex justify-between items-center shadow-lg";
                    card.innerHTML = `
                        <div class="flex items-center gap-4">
                            <span class="bg-yellow-500 text-black font-black px-2 py-1 rounded-lg text-xs">${t.hora}</span>
                            <div>
                                <p class="font-bold text-gray-200 capitalize">${t.cliente}</p>
                                <p class="text-[10px] text-yellow-500/80 font-mono">${t.telefono || 'Sin teléfono'}</p>
                            </div>
                        </div>
                        <button onclick="borrarRegistro('${t.id}')" class="text-red-400 p-2">🗑️</button>
                    `;
                    listaTurnos.appendChild(card);
                });
            });
        }

        async function togglerBloqueo(hora, estaBloqueadoActualmente, esDomingo, snapshot) {
            let idExistente = "";
            snapshot.forEach(d => { if(d.data().hora === hora) idExistente = d.id; });

            if (esDomingo) {
                if (estaBloqueadoActualmente) {
                    // Si está rojo en domingo, lo "Abrimos"
                    await addDoc(collection(db, "turnos"), { cliente: "ABIERTO_DOMINGO", fecha: filtroFecha.value, hora: hora });
                } else {
                    // Si está gris en domingo, borramos el permiso de apertura
                    if (idExistente) await deleteDoc(doc(db, "turnos", idExistente));
                }
            } else {
                if (estaBloqueadoActualmente) {
                    if (idExistente) await deleteDoc(doc(db, "turnos", idExistente));
                } else {
                    await addDoc(collection(db, "turnos"), { cliente: "BLOQUEADO", fecha: filtroFecha.value, hora: hora });
                }
            }
        }
        // ...
    </script>
</body>
