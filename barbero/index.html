<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // TUS CREDENCIALES INTEGRADAS
    const firebaseConfig = {
      apiKey: "AIzaSyCLBGU0u6QYdAweKqSia7yFMSvS9F4QHBM",
      authDomain: "barberia-4b1f9.firebaseapp.com",
      projectId: "barberia-4b1f9",
      storageBucket: "barberia-4b1f9.firebasestorage.app",
      messagingSenderId: "1062067345937",
      appId: "1:1062067345937:web:fdd305a34a21c67837afb0",
      measurementId: "G-XTF1P4LKV8"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const slotsContainer = document.getElementById('slots');
    const inputFecha = document.getElementById('fecha');
    const horariosBase = ["10:00", "11:00", "12:00", "15:00", "16:00", "17:00", "18:00"];
    let horaSeleccionada = "";

    // Escuchar cuando el cliente cambia la fecha
    inputFecha.addEventListener('change', cargarDisponibilidad);

    async function cargarDisponibilidad() {
        slotsContainer.innerHTML = "<p class='col-span-3 text-center'>Cargando horarios...</p>";
        const fechaElegida = inputFecha.value;

        // 1. Buscar en Firebase qué turnos ya existen para esa fecha
        const q = query(collection(db, "turnos"), where("fecha", "==", fechaElegida));
        const querySnapshot = await getDocs(q);
        const horasOcupadas = [];
        querySnapshot.forEach((doc) => horasOcupadas.push(doc.data().hora));

        // 2. Limpiar y dibujar los botones
        slotsContainer.innerHTML = "";
        horariosBase.forEach(hora => {
            const estaOcupado = horasOcupadas.includes(hora);
            const btn = document.createElement('button');
            btn.innerText = hora;
            
            if (estaOcupado) {
                btn.className = "py-2 bg-gray-800 text-gray-600 rounded-lg cursor-not-allowed border border-gray-700";
                btn.disabled = true;
            } else {
                btn.className = "py-2 bg-gray-700 rounded-lg hover:bg-yellow-500 hover:text-black transition";
                btn.onclick = () => {
                    document.querySelectorAll('#slots button').forEach(b => {
                        if(!b.disabled) b.className = "py-2 bg-gray-700 rounded-lg hover:bg-yellow-500 hover:text-black transition";
                    });
                    btn.className = "py-2 bg-yellow-500 text-black font-bold rounded-lg";
                    horaSeleccionada = hora;
                };
            }
            slotsContainer.appendChild(btn);
        });
    }

    window.confirmarTurno = async () => {
        const fecha = inputFecha.value;
        const nombre = document.getElementById('nombreCliente').value;

        if(!fecha || !horaSeleccionada || !nombre) {
            alert("Completa todos los datos");
            return;
        }

        try {
            await addDoc(collection(db, "turnos"), {
                cliente: nombre,
                fecha: fecha,
                hora: horaSeleccionada,
                estado: "confirmado"
            });
            alert("¡Turno reservado!");
            location.reload(); // Recargar para limpiar
        } catch (e) { alert("Error al reservar"); }
    }
</script>
