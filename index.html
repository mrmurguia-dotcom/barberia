<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería LyonBarber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EAB308">
    <style>
        body { background-color: #0f172a; }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-6 text-center">
        <img src="logom2.jpg" alt="Logo" class="w-32 h-32 mx-auto rounded-full border-4 border-yellow-500 mb-6 shadow-xl">
        
        <h1 class="text-3xl font-bold mb-2 italic text-yellow-500 text-yellow-500">BARBERÍA LYON BARBER</h1>
        <p class="text-gray-400 mb-10">Gestión de turnos y reservas</p>

        <div class="grid gap-4">
            <a href="cliente/index.html" class="bg-gray-800 border border-gray-700 p-6 rounded-2xl flex items-center gap-4 hover:bg-gray-700 transition active:scale-95 shadow-lg">
                <div class="bg-yellow-500 p-3 rounded-xl text-black text-2xl">📅</div>
                <div class="text-left">
                    <span class="block font-bold text-lg">Vista Clientes</span>
                    <span class="text-xs text-gray-500 uppercase font-semibold">Link para compartir</span>
                </div>
            </a>

            <a href="barbero/index.html" class="bg-gray-800 border border-gray-700 p-6 rounded-2xl flex items-center gap-4 hover:bg-gray-700 transition active:scale-95 shadow-lg">
                <div class="bg-blue-500 p-3 rounded-xl text-white text-2xl">✂️</div>
                <div class="text-left">
                    <span class="block font-bold text-lg">Panel Barbero</span>
                    <span class="text-xs text-gray-500 uppercase font-semibold">Uso interno solamente</span>
                </div>
            </a>
        </div>

        <p class="mt-12 text-gray-600 text-sm">© 2026 Barbería Pro System - M2 CONSULTORIA DIGITAL</p>
    </div>

    <script>
        // Registrar Service Worker para que sea instalable
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('Error:', err));
            });
        }
    </script>
</body>
</html>
